model:
  name: "Qwen/Qwen3-4B-Instruct-2507"
  attn_implementation: "sdpa"
  dtype: "bfloat16"

dataset:
  name: "trl-lib/DeepMath-103K"
  split: "train"
  max_samples: 0

vllm:
  server_url: "http://127.0.0.1"
  server_port: 8800
  server_timeout: 600.0
  classifier_update_timeout: 10.0
  max_model_length: 4096
  completions_endpoint: "/v1/entropy_v2/completions"
  classifier_update_endpoint: "/entropy_v2/update_classifier"

training:
  output_dir: "outputs/grpo_simple"
  max_steps: 500
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 64
  num_generations: 8
  max_inflight_tasks: 100
  max_completion_length: 1024
  learning_rate: 5e-6
  logging_steps: 1
  save_steps: 25
  temperature: 1.0
  report_to: "wandb"
  seed: 42
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05

entropy:
  threshold_chunk_size: 48
  topk_entropy: 3
  max_interventions: 4
  num_samples: 4
  max_success_trigger_rate: 0.1
  max_records: 256
  classifier_update_interval: 32 # update after n new completions
  classifier_min_success_records: 128
  classifier_min_failure_records: 128
  classifier_train_steps: 1000
  classifier_learning_rate: 0.01
  classifier_l2: 0.0
  classifier_feature_mode: "combined"
  classifier_hidden_dims: [128, 64, 32]
  classifier_inference_stride: 16
  classifier_frontier_caps: [0.10, 0.15, 0.20, 0.25]
